<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dish Details</title>
    <link rel="stylesheet" href="../style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <script src="../scripts/header.js" defer></script>
    <script src="../scripts/dish.js" defer></script>
  </head>
  <body>
    <header></header>
    <main id="dish-content" class="dish-info">
      <div class="image-container">
        <img id="image" src="" alt="Dish Image" />
      </div>
      <div class="dish-details">
        <h2 id="name"></h2>
        <p id="category"></p>
        <p id="price"></p>
        <p id="calories"></p>
        <p id="rating"></p>
        <p id="description"></p>
      </div>
    </main>
  </body>
</html>
